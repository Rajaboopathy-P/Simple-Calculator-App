<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital clock with Date</title>
</head>
<style>
    *{ box-sizing: border-box; margin: 0; padding: 0; }
    h1{ margin: 18px 0 8px; font-family: 'Segoe UI', Tahoma, sans-serif; text-shadow: 0 0 12px rgba(100,100,255,0.18); color: #e6e9ff; font-size: clamp(1.1rem, 2.2vw, 1.5rem); }
    body{ min-height: 100dvh; display: flex; justify-content: center; align-items: center; background: #010111; color: #fff; flex-direction: column; padding: 16px; position: relative; overflow: hidden; }
    .datetime{ color: white; background: linear-gradient(145deg, rgba(10,10,30,0.95), rgba(20,12,60,0.95)); font-family: 'Segoe UI', sans-serif; width: min(94vw, 480px); max-width: 520px; padding: 18px 16px; border-radius: 14px; transition: transform 0.22s ease, box-shadow 0.22s ease; box-shadow: 0 10px 36px rgba(12,10,35,0.6), inset 0 1px 0 rgba(255,255,255,0.02); border: 1px solid rgba(120,110,255,0.08); }
    .datetime:hover{ transform: translateY(-4px); box-shadow: 0 14px 46px rgba(70,54,214,0.2); background: linear-gradient(145deg, rgba(28,18,110,0.98), rgba(70,54,214,0.98)); }
    .date{ font-size: clamp(0.9rem, 2.2vw, 1.1rem); font-weight: 600; text-align: center; letter-spacing: 2.5px; color: #dfe6ff; margin-bottom: 6px; }

    :root[data-theme="light"] body{ background: #f4f6ff; color: #1c2435; }
    :root[data-theme="light"] .datetime{ background: linear-gradient(145deg, #ffffff, #edf2ff); color: #1c2435; border-color: rgba(80,100,220,0.16); box-shadow: 0 10px 28px rgba(82,94,138,0.12); }
    :root[data-theme="light"] .datetime:hover{ background: linear-gradient(145deg, #fbfbff, #e3e8ff); box-shadow: 0 14px 40px rgba(80,100,220,0.14); }
    :root[data-theme="light"] .date, :root[data-theme="light"] .controls label{ color: #2b3050; }
    :root[data-theme="light"] .controls select{ background: rgba(255,255,255,0.92); color: #1c2435; border-color: rgba(80,100,220,0.16); }
    :root[data-theme="light"] .time span:last-child{ background: rgba(32,44,75,0.08); color: #1f2c4b; border-color: rgba(32,44,75,0.12); }

    :root[data-theme="accent"] body{ background: #071828; color: #eef6ff; }
    :root[data-theme="accent"] .datetime{ background: linear-gradient(145deg, #081d2e, #122f4b); color: #e8f7ff; border-color: rgba(68,215,255,0.25); box-shadow: 0 10px 36px rgba(24,31,60,0.75); }
    :root[data-theme="accent"] .datetime:hover{ background: linear-gradient(145deg, #09243b, #1c4f78); box-shadow: 0 14px 46px rgba(68,215,255,0.2); }
    :root[data-theme="accent"] .date, :root[data-theme="accent"] .controls label{ color: #bce9ff; }
    :root[data-theme="accent"] .controls select{ background: rgba(8,24,42,0.95); color: #d6f5ff; border-color: rgba(68,215,255,0.35); }
    :root[data-theme="accent"] .time span:last-child{ background: rgba(68,215,255,0.16); color: #ebf7ff; border-color: rgba(68,215,255,0.45); }
    .time{ font-size: clamp(2rem, 8vw, 3.6rem); display: flex; justify-content: center; align-items: center; flex-wrap: wrap; gap: 6px; }
    .time span:not(:last-child){ display: inline-block; margin: 0 6px; font-weight: 700; text-align: center; letter-spacing: 1.8px; }
    .time span:last-child{ background: rgba(255,255,255,0.06); color: #eef0ff; font-size: clamp(0.75rem, 2.6vw, 1rem); font-weight: 700; text-transform: uppercase; margin-top: 6px; padding: 6px 8px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.04); }

    /* Tablet */
    @media (max-width: 900px){
        .datetime{ width: min(94vw, 440px); padding: 16px; }
        .time{ font-size: clamp(1.8rem, 7.5vw, 3rem); }
        .date{ letter-spacing: 2px }
    }

    /* Mobile */
    @media (max-width: 520px){
        h1{ margin: 14px 0 6px }
        .datetime{ padding: 12px; width: 94vw; }
        .date{ font-size: 14px; letter-spacing: 1.4px }
        .time{ font-size: clamp(1.6rem, 12vw, 2.6rem); gap: 4px; align-items: baseline }
        .time span:not(:last-child){ margin: 0 4px }
        .time span:last-child{ order: 2; margin-left: 6px; align-self: center }
        .controls{ flex-direction: column; gap: 8px; width: 100%; }
        .controls label{ justify-content: center; width: 100%; }
        .controls select{ width: 100%; }
    }

    /* Very small screens: stack period on new line */
    @media (max-width: 360px){
        .time{ gap: 8px }
        .time span:last-child{ width: 100%; text-align: center; order: 3; margin-top: 6px }
    }

    /* controls */
    .controls{ display:flex; gap:12px; align-items:center; justify-content:center; flex-wrap:wrap; margin-bottom:12px; }
    .controls label{ display:flex; gap:6px; align-items:center; color: #dfe6ff; font-size: 0.95rem }
    .controls select{ background: rgba(255,255,255,0.04); color: #eef0ff; border:1px solid rgba(255,255,255,0.04); padding:4px 6px; border-radius:6px }

    /* blinking colon */
    .sep{ display:inline-block; width:auto }
    @keyframes blink{ 0%,40%{ opacity:1 } 50%{ opacity:0 } 100%{ opacity:1 } }
    .blink-on .sep{ animation: blink 1s steps(1) infinite }
    @media (prefers-reduced-motion: reduce){ .blink-on .sep{ animation: none } }

    /* Background animated glow */
    body::before{
        content: "";
        position: absolute;
        inset: 0;
        z-index: -1;
        pointer-events: none;
        background-color: #010111;
        background-image:
            radial-gradient(circle at 10% 20%, rgba(70,54,214,0.18) 0%, rgba(70,54,214,0.06) 8%, transparent 25%),
            radial-gradient(circle at 85% 80%, rgba(60,180,255,0.10) 0%, rgba(60,180,255,0.04) 12%, transparent 30%);
        background-repeat: no-repeat;
        transform-origin: center;
        will-change: transform, opacity;
        animation: bgShift 14s linear infinite alternate;
        filter: blur(24px) saturate(120%);
        mix-blend-mode: screen;
    }

    body::after{
        content: "";
        position: absolute;
        inset: 0;
        z-index: -2;
        background: linear-gradient(180deg, rgba(0,0,0,0.18), rgba(0,0,0,0.45));
        pointer-events: none;
    }

    @keyframes bgShift{
        0%{ transform: translate(-6%, -4%) scale(1); opacity: 0.9 }
        50%{ transform: translate(6%, 4%) scale(1.05); opacity: 1 }
        100%{ transform: translate(-6%, 6%) scale(1); opacity: 0.92 }
    }
</style>
<body> 
    <h1>DigitalClock</h1>
    <div class="controls" role="region" aria-label="Clock controls">
        <label>
            <input id="toggle-24" type="checkbox" />
            <span>24-hour</span>
        </label>
        <label>
            <select id="theme-select" aria-label="Theme selector">
                <option value="dark">Dark</option>
                <option value="light">Light</option>
                <option value="accent">Accent</option>
            </select>
        </label>
        <label>
            <input id="blink-toggle" type="checkbox" />
            <span>Blink colon</span>
        </label>
    </div>
    <div class="datetime">
    <div class="date">
        <span id="dayname">Day</span>,
         <span id="month">Month</span>
         <span id="daynum">00</span>,
         <span id="year">Year</span>
    </div>
    <div class="time">
                    <span id="hour">00</span><span class="sep">:</span>
                    <span id="minutes">00</span><span class="sep">:</span>
                    <span id="Seconds">00</span>
                    <span id="period">AM</span>
    </div>
 
  </div>
</body>
<script>
    function initclock(){
        updateclock();
        window.setInterval(updateclock,1000);
    }
    // --- Settings and UI handlers ---
    const SETTINGS_KEY = 'clock_settings_v1';
    const defaultSettings = { hour24: false, theme: 'dark', blink: true };

    function loadSettings(){
        try{ const raw = localStorage.getItem(SETTINGS_KEY); return raw? JSON.parse(raw): {...defaultSettings}; }
        catch(e){ return {...defaultSettings}; }
    }
    function saveSettings(s){ localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); }

    function applySettings(){
        const s = loadSettings();
        document.getElementById('toggle-24').checked = s.hour24;
        document.getElementById('theme-select').value = s.theme;
        document.getElementById('blink-toggle').checked = s.blink;
        document.documentElement.setAttribute('data-theme', s.theme);
        if(s.blink) document.body.classList.add('blink-on'); else document.body.classList.remove('blink-on');
    }

    // updateclock should respect 24-hour setting
    function updateclock(){
        const s = loadSettings();
        let now = new Date();
        let dname = now.getDay(), mo = now.getMonth(), dnum = now.getDate(), yr = now.getFullYear(), hou = now.getHours(), min = now.getMinutes(), sec = now.getSeconds(), pe = "";

        if(!s.hour24){
            pe = (hou >= 12) ? 'PM' : 'AM';
            if (hou === 0) hou = 12; else if (hou > 12) hou = hou - 12;
        } else {
            pe = '';
        }

        const pad = (n) => n.toString().padStart(2, '0');
        let months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
        let week = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
        let ids = ["dayname","month","daynum","year","hour","minutes","Seconds","period"];
        let values = [week[dname], months[mo], pad(dnum), yr, pad(hou), pad(min), pad(sec), pe];

        for (let i = 0; i < ids.length; i++) {
            const el = document.getElementById(ids[i]);
            if (el) el.textContent = values[i];
        }
    }

    function initControls(){
        applySettings();
        document.getElementById('toggle-24').addEventListener('change', e=>{ const s=loadSettings(); s.hour24 = e.target.checked; saveSettings(s); applySettings(); updateclock(); });
        document.getElementById('theme-select').addEventListener('change', e=>{ const s=loadSettings(); s.theme = e.target.value; saveSettings(s); applySettings(); });
        document.getElementById('blink-toggle').addEventListener('change', e=>{ const s=loadSettings(); s.blink = e.target.checked; saveSettings(s); applySettings(); });

        // keyboard shortcuts
        window.addEventListener('keydown', (ev)=>{
            if(ev.key === 't'){ // toggle theme
                const s=loadSettings(); s.theme = (s.theme==='dark')?'light':'dark'; saveSettings(s); applySettings();
            } else if(ev.key === 'f'){ // toggle 24/12
                const s=loadSettings(); s.hour24 = !s.hour24; saveSettings(s); applySettings(); updateclock();
            } else if(ev.key === 'b'){ // toggle blink
                const s=loadSettings(); s.blink = !s.blink; saveSettings(s); applySettings();
            }
        });
    }

    // initialize on load
    window.addEventListener('load', ()=>{ initclock(); initControls(); });
</script>

</html>

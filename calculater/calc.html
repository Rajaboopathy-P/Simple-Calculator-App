
    .sqrt-btn {
    .operator {
        background: linear-gradient(135deg, #ff9500 0%, #ff8c00 100%);
    }
  
</style>
<body>
        <div id="box">
        <input id="selfie" placeholder=" <Calculater>">
        <h1 id="name">Boopathy</h1>
        <div id="inpsec">
        <input id="inp" type="text"></div>
        <div id="btnsec">
        <button onclick="collect('(')" class="operator">(</button>
        <button onclick="collect(')')" class="operator">)</button>
        <button onclick="collect('%')" class="operator">%</button>
        <button onclick="del()" class="del-btn">Del</button>
        <button onclick="clearitem()" id="clearitem" class="del-btn">C</button>
        <button onclick="sqrt()" class="sqrt-btn">√</button>
        <button onclick="collect('/')" class="operator">&divide;</button>
        <button onclick="collect('7')">7</button>
        <button onclick="collect('8')">8</button>
        <button onclick="collect('9')">9</button>
        <button onclick="collect('+')" class="operator">&plus;</button>
        <button onclick="collect('4')">4</button>
        <button onclick="collect('5')">5</button>
        <button onclick="collect('6')">6</button>
        <button onclick="collect('-')" class="operator">&minus;</button> 
        <button onclick="collect('1')">1</button>
        <button onclick="collect('2')">2</button>
        <button onclick="collect('3')">3</button>
        <button onclick="collect('*')" class="operator">&times;</button>
        <button onclick="collect('0')">0</button>
        <button onclick="collect('00')">00</button>
        <button onclick="collect('.')">.</button>
        <button onclick="ans()" class="equal-btn">=</button></div>
         
    </div>
   
</body>
<script>
   let inp= document.getElementById("inp")
     let val=""
   function collect(e){
    val+=e
    inp.value=val
    
   }

   function ans(){
    try{
      if(val === ""){
        inp.value = "0"
        return
      }
      let result = eval(val)
      val = ""
      inp.value = result
    }catch(error){
      inp.value = "Error"
      val = ""
    }
   }

   function clearitem(){
    inp.value=""
    val=""
   }

   function del(){
    val = val.slice(0, -1);
    inp.value = val;
   }
   
   function sqrt(){
    try{
      if(val === ""){
        return
      }
      let result = Math.sqrt(eval(val))
      val = result
      inp.value = result
    }catch(error){
      inp.value = "Error"
      val = ""
    }
   }
   
</script>
</html>

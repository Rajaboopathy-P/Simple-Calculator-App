<script>
   let inp= document.getElementById("inp")
     let val=""
   function collect(e){
    val+=e
    inp.value=val
    
   }

   function ans(){
    try{
      if(val === ""){
        inp.value = "0"
        return
      }
      let result = eval(val)
      val = ""
      inp.value = result
    }catch(error){
      inp.value = "Error"
      val = ""
    }
   }

   function clearitem(){
    inp.value=""
    val=""
   }

   function del(){
    val = val.slice(0, -1);
    inp.value = val;
   }
   
   function sqrt(){
    try{
      if(val === ""){
        return
      }
      let result = Math.sqrt(eval(val))
      val = result
      inp.value = result
    }catch(error){
      inp.value = "Error"
      val = ""
    }
   }
   
</script>
